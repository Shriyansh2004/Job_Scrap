services:
  db:
    image: postgres:16
    container_name: job_scraper_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_scraper
    ports:
      - "5432:5432"
    volumes:
      - job_scraper_pgdata:/var/lib/postgresql/data

volumes:
  job_scraper_pgdata:

