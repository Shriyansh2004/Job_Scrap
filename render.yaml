services:
  - type: web
    name: job-scraper-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job_scraper_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_URL
        fromService:
          type: web
          name: job-scraper-backend
          property: url
      - key: ALLOWED_ORIGINS
        # Update this with your frontend URL after deployment
        value: "https://your-frontend.vercel.app"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: job_scraper_db
    plan: free
    region: oregon

