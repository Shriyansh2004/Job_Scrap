services:
  - type: web
    name: job-scraper-backend
    env: python
    rootDir: backend
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job_scraper_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        # Update this with your frontend URL after deployment
        value: "https://anubhabjob.netlify.app/"

databases:
  - name: job_scraper_db
    plan: free
    region: oregon

